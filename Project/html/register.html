<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project</title>
    <link rel="stylesheet" href="../css/register.css">
    <link rel="stylesheet" href="../css/reponsive_register.css">
</head>
<body>
    <div class="container">
    <h2>Đăng ký tài khoản</h2>
    <p class="sub">Đăng ký tài khoản để sử dụng dịch vụ</p>

    <form>
        <div class="row">
            <div class="form-group">
                <label>Họ và tên đệm</label>
                <input type="text">
            </div>
            <div class="form-group">
                <label>Tên</label>
                <input type="text">
            </div>
        </div>
        
        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="you@company.com">
        </div>

        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password">
        </div>

        <div class="checkbox">
            <input type="checkbox" id="agree">
            <label for="agree">
                Bạn đồng ý với <a href="#">chính sách và điều khoản</a>
            </label>
        </div>

        <button type="submit">Đăng ký</button>

        <p class="login">
            Bạn đã có tài khoản? <a href="login.html">Đăng nhập</a>
        </p>
    </form>
</div>
</body>
</html>
