<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project</title>
    <link rel="stylesheet" href="../css/register.css">
    <link rel="stylesheet" href="../css/reponsive_register.css">
</head>
<body>
    <div class="container">
    <h2>Đăng ký tài khoản</h2>
    <p class="sub">Đăng ký tài khoản để sử dụng dịch vụ</p>

    <form id="registerForm">
        <div class="row">
            <div class="form-group">
                <label>Họ và tên đệm</label>
                <input type="text" id="firstName">
                <small class="error" id="firstNameError"></small>
            </div>
            <div class="form-group">
                <label>Tên</label>
                <input type="text" id="lastName">
                <small class="error" id="lastNameError"></small>
            </div>
        </div>
        
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="you@company.com">
            <small class="error" id="emailError"></small>
        </div>

        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" id="password">
            <small class="error" id="passwordError"></small>
        </div>

        <div class="checkbox">
            <input type="checkbox" id="agree">
            <label for="agree" id="error-text">
                Bạn đồng ý với <a href="#">chính sách và điều khoản</a>
            </label>
                <small class="error" id="agreeError"></small>
        </div>

        <button type="submit">Đăng ký</button>

        <p class="login">
            Bạn đã có tài khoản? <a href="login.html">Đăng nhập</a>
        </p>
    </form>
</div>
<script src="../js/register.js"></script>
</body>
</html>
